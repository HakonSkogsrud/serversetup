---
- name: Check if Loki live data directory exists
  ansible.builtin.stat:
    path: "{{ loki_live_data_path }}"
  register: loki_backup_data_exists

- name: Backup Loki data
  when: loki_backup_data_exists.stat.exists
  block:
    - name: Create backup archive of Loki data
      community.general.archive:
        path: "{{ loki_live_data_path }}"
        dest: "/tmp/loki-backup.tar.gz"
        format: gz
        mode: "0644"
      become: true

    - name: Fetch backup to controller
      ansible.builtin.fetch:
        src: "/tmp/loki-backup.tar.gz"
        dest: "/tmp/loki-backup.tar.gz"
        flat: true

    - name: Clean up temp backup file on remote
      ansible.builtin.file:
        path: "/tmp/loki-backup.tar.gz"
        state: absent