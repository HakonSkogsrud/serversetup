---
- name: Check if pihole config exists
  ansible.builtin.stat:
    path: "{{ pihole_docker_config_file }}"
  register: pihole_docker_backup_config_exists

- name: Check if pihole compose file exists
  ansible.builtin.stat:
    path: "{{ pihole_docker_compose_file }}"
  register: pihole_docker_backup_compose_exists

- name: Backup pihole
  when: pihole_docker_backup_config_exists.stat.exists
  block:
    - name: Ensure backup directory exists
      ansible.builtin.file:
        path: "{{ pihole_docker_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Stop pihole container
      ansible.builtin.shell:
        cmd: docker compose stop pihole || true
        chdir: "{{ pihole_docker_base_dir }}"
      changed_when: pihole_docker_backup_compose_exists.stat.exists
      when: pihole_docker_backup_compose_exists.stat.exists

    - name: Create backup archive
      ansible.builtin.shell:
        cmd: >-
          tar -czf {{ pihole_docker_backup_dir }}/pihole_$(date +%Y%m%d_%H%M%S).tar.gz
          -C {{ pihole_docker_base_dir }} docker-compose.yml etc-pihole
      changed_when: true

    - name: Start pihole container
      ansible.builtin.shell:
        cmd: docker compose start pihole || true
        chdir: "{{ pihole_docker_base_dir }}"
      changed_when: pihole_docker_backup_compose_exists.stat.exists
      when: pihole_docker_backup_compose_exists.stat.exists
