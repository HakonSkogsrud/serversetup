---
- name: Ensure project directory exists
  ansible.builtin.file:
    path: "{{ immich_project_dir }}"
    state: directory
    owner: "{{ template.user }}"
    group: docker
    mode: "0755"

- name: Ensure Immich shared storage directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ template.user }}"
    group: docker
    mode: "0755"
  become: true
  loop:
    - "{{ immich_thumbs_dir }}"
    - "{{ immich_encoded_video_dir }}"

- name: Ensure local Immich mount point directories exist
  ansible.builtin.file:
    path: "{{ immich_project_dir }}/library/{{ item }}"
    state: directory
    owner: "{{ template.user }}"
    group: docker
    mode: "0755"
  become: true
  loop:
    - "thumbs"
    - "encoded-video"

- name: Deploy Immich compose files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ template.user }}"
    group: docker
    mode: "{{ item.mode }}"
  become: true
  loop:
    - src: docker-compose.yml.j2
      dest: "{{ immich_project_dir }}/docker-compose.yml"
      mode: "0644"
    - src: .env.j2
      dest: "{{ immich_project_dir }}/.env"
      mode: "0640"

- name: Check if Immich DB directory exists
  ansible.builtin.stat:
    path: "{{ immich_project_dir }}/postgres"
  register: immich_db_dir

# ----------------------------------------------------------
# Restore from backup if db dir not exists
# ----------------------------------------------------------
- name: Restore if db dir not exists
  ansible.builtin.include_tasks: restore.yml
  when: not immich_db_dir.stat.exists

# ----------------------------------------------------------
# Otherwise, just start the existing stack
# ----------------------------------------------------------
- name: Start existing Immich stack
  community.docker.docker_compose_v2:
    project_src: "{{ immich_project_dir }}"
    state: present
  become: true
  when: immich_db_dir.stat.exists
