- name: Configure firewalld for Immich
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  become: true
  loop:
    - "2283/tcp"
  notify: Reload firewalld

- name: Copy backup data files to project directory
  ansible.posix.synchronize:
    src: "{{ immich_backup_data_dir }}"
    dest: "{{ immich_project_dir }}"
    archive: true
    rsync_opts:
      - "--exclude=library/thumbs"
      - "--exclude=library/encoded-video"
      - "--exclude=library/thumbs.pre-migration-backup"
      - "--exclude=library/encoded-video.pre-migration-backup"
  delegate_to: "{{ inventory_hostname }}"

- name: Deploy Immich compose files after restore sync
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "{{ template.user }}"
    group: docker
    mode: "{{ item.mode }}"
  become: true
  loop:
    - src: docker-compose.yml.j2
      dest: "{{ immich_project_dir }}/docker-compose.yml"
      mode: "0644"
    - src: .env.j2
      dest: "{{ immich_project_dir }}/.env"
      mode: "0640"

- name: Ensure Immich shared storage directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ template.user }}"
    group: docker
    mode: "0755"
  become: true
  loop:
    - "{{ immich_thumbs_dir }}"
    - "{{ immich_encoded_video_dir }}"

- name: Ensure Immich library subdirectories exist
  ansible.builtin.file:
    path: "{{ immich_project_dir }}/library/{{ item }}"
    state: directory
    owner: "{{ template.user }}"
    group: docker
    mode: "0755"
  become: true
  loop:
    - "upload"
    - "library"
    - "thumbs"
    - "encoded-video"
    - "profile"
    - "backups"

- name: Create .immich marker files for storage integrity checks
  ansible.builtin.file:
    path: "{{ immich_project_dir }}/library/{{ item }}/.immich"
    state: touch
    owner: "{{ template.user }}"
    group: docker
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  become: true
  loop:
    - "upload"
    - "library"
    - "profile"
    - "backups"

- name: Create .immich marker files for shared storage directories
  ansible.builtin.file:
    path: "{{ item }}/.immich"
    state: touch
    owner: "{{ template.user }}"
    group: docker
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  become: true
  loop:
    - "{{ immich_thumbs_dir }}"
    - "{{ immich_encoded_video_dir }}"

- name: Pull latest Docker images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ immich_project_dir }}"

- name: Restore Immich backup if DB directory missing
  ansible.builtin.shell: |
    set -e -o pipefail
    docker compose create
    docker start immich_postgres
    sleep 10
    gunzip --stdout {{ immich_backup_dump }} \
      | sed "s/SELECT pg_catalog.set_config('search_path', '', false);/SELECT pg_catalog.set_config('search_path', 'public, pg_catalog', true);/g" \
      | docker exec -i immich_postgres psql --dbname=postgres --username=postgres
    docker compose up -d
  args:
    chdir: "{{ immich_project_dir }}"
    executable: /bin/bash
  become: true
  when: not immich_db_dir.stat.exists
  changed_when: true # Restores database from backup, always makes changes
