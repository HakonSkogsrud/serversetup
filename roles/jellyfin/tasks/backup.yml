---
- name: Ensure jellyfin backup directory exists
  ansible.builtin.file:
    path: "{{ jellyfin_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Stop Jellyfin container before backup
  community.docker.docker_compose_v2:
    project_src: "{{ jellyfin_dir }}"
    state: stopped
  become: true

- name: Create backup archive of jellyfin config
  ansible.builtin.shell:
    cmd: >
      tar -czf {{ jellyfin_backup_dir }}/jellyfin_config.tar.gz
      --exclude='./cache'
      --exclude='./data/transcodes'
      -C {{ jellyfin_dir }} .
    creates: "{{ jellyfin_backup_dir }}/jellyfin_config.tar.gz"
  become: true
  changed_when: true

- name: Start Jellyfin container after backup
  community.docker.docker_compose_v2:
    project_src: "{{ jellyfin_dir }}"
    state: present
  become: true
