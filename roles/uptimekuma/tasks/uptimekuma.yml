---
- name: ensure uptimekuma directory exists
  ansible.builtin.file:
    path: "{{ uptimekuma_data_dir }}"
    state: directory
    owner: "{{ template.user }}"
    group: "{{ template.user }}"
    mode: "0755"

- name: copy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ uptimekuma_data_dir | dirname }}/docker-compose.yml"
    owner: "{{ template.user }}"
    group: "{{ template.user }}"
    mode: "0644"
  notify: Restart uptimekuma

- name: start uptimekuma container
  ansible.builtin.shell:
    cmd: docker compose up -d
    chdir: "{{ uptimekuma_data_dir | dirname }}"
    creates: "{{ uptimekuma_data_dir | dirname }}/docker-compose.yml"

- name: Configure firewalld for UptimeKuma
  ansible.posix.firewalld:
    port: "3001/tcp"
    permanent: true
    state: enabled
    immediate: true
  become: true
