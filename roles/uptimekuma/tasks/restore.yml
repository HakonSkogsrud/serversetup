---
- name: Find newest uptimekuma backup
  ansible.builtin.shell:
    cmd: "ls -t uk_*.tar.gz 2>/dev/null | head -1"
    chdir: "{{ uptimekuma_backup_dir }}"
  register: newest_backup
  failed_when: false

- name: Restore uptimekuma data
  when: newest_backup.stdout | length > 0
  block:
    - name: Stop uptimekuma container
      ansible.builtin.shell:
        cmd: "cd /home/{{ template.user }}/uptimekuma && docker compose stop"
      changed_when: true

    - name: Extract backup to data directory
      ansible.builtin.unarchive:
        src: "{{ uptimekuma_backup_dir }}/{{ newest_backup.stdout }}"
        dest: "{{ uptimekuma_data_dir }}"
        remote_src: true
        owner: "{{ template.user }}"
        group: "{{ template.user }}"
      become: true

    - name: Start uptimekuma container
      ansible.builtin.shell:
        cmd: "cd /home/{{ template.user }}/uptimekuma && docker compose start"
      changed_when: true
