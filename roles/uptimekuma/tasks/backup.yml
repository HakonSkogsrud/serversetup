---
- name: Check if uptimekuma data directory exists
  ansible.builtin.stat:
    path: "{{ uptimekuma_data_dir }}"
  register: uptimekuma_backup_data_exists

- name: Backup uptimekuma
  when: uptimekuma_backup_data_exists.stat.exists
  block:
    - name: Ensure backup directory exists with correct ownership
      ansible.builtin.file:
        path: "{{ uptimekuma_backup_dir }}"
        state: directory
        owner: "{{ template.user }}"
        group: "{{ template.user }}"
        mode: "0755"

    - name: stop uptimekuma container
      ansible.builtin.shell:
        cmd: docker compose stop
        chdir: "{{ uptimekuma_data_dir | dirname }}"
      become_user: "{{ template.user }}"
      changed_when: true

    - name: create backup of uptimekuma data directory
      ansible.builtin.shell:
        cmd: >
          tar -czf {{ uptimekuma_backup_dir }}/uptimekuma_$(date +%Y%m%d_%H%M%S).tar.gz
          -C {{ uptimekuma_data_dir | dirname }} {{ uptimekuma_data_dir | basename }}
      become_user: "{{ template.user }}"
      changed_when: true

    - name: fix ownership of backup files
      ansible.builtin.shell:
        cmd: chown {{ template.user }}:{{ template.user }} {{ uptimekuma_backup_dir }}/*
      changed_when: true

    - name: start uptimekuma container
      ansible.builtin.shell:
        cmd: docker compose start
        chdir: "{{ uptimekuma_data_dir | dirname }}"
      become_user: "{{ template.user }}"
      changed_when: true
