---
# Verification playbook: checks that all expected systemd services and timers
# managed by this repo are enabled and in the correct active state.
#
# Usage:
#   ansible-playbook playbooks/verify_services.yml --vault-password-file=<vault-file>
#
# This playbook makes NO changes to any host — it only reads state and asserts.

- name: Verify systemd units on proxmox
  hosts: proxmox
  become: true
  gather_facts: false
  vars_files:
    - ../secrets.yml
  vars:
    expected_running_services:
      - alloy.service
    expected_enabled_services:
      - zfs-load-key.service
    expected_timers:
      - create-template-vm.timer
      - sanoid.timer
      - syncoid.timer
      - scheduled-update.timer
  tasks:
    - name: Include verification tasks
      ansible.builtin.include_tasks: "{{ playbook_dir }}/verify_tasks.yml"

