---
- name: Prepare local artifact directory for virtiofs failure collection
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Freeze collection id for this run
      ansible.builtin.set_fact:
        virtiofs_failure_collection_id: "{{ lookup('pipe', 'date +%Y%m%d_%H%M%S') }}"

    - name: Freeze artifact directory facts for this collection run
      ansible.builtin.set_fact:
        virtiofs_failure_output_dir: "{{ playbook_dir | dirname | dirname }}/artifacts/virtiofs-failure/{{ virtiofs_failure_collection_id }}"
        virtiofs_failure_timestamp: "{{ virtiofs_failure_timestamp_hint | default('') }}"

    - name: Ensure local artifact directory exists
      ansible.builtin.file:
        path: "{{ hostvars['localhost'].virtiofs_failure_output_dir }}"
        state: directory
        mode: "0755"

- name: Collect services-side virtiofs failure evidence
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check whether services SSH is reachable
      ansible.builtin.wait_for:
        host: "{{ hostvars['services'].ansible_host }}"
        port: 22
        timeout: 5
        connect_timeout: 3
      register: services_ssh
      ignore_errors: true
      changed_when: false

    - name: Record unreachable services host locally
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost'].virtiofs_failure_output_dir }}/services-unreachable.txt"
        content: |
          collected_at={{ lookup('pipe', 'date --iso-8601=seconds') }}
          host=services
          ansible_host={{ hostvars['services'].ansible_host }}
          reason={{ services_ssh.msg | default('ssh port check failed') }}
        mode: "0644"
      when: services_ssh is failed

    - name: Read mount probe state
      ansible.builtin.shell: cat /var/lib/mount_probe/state 2>/dev/null || true
      delegate_to: services
      become: true
      register: mount_probe_state
      changed_when: false
      when: services_ssh is succeeded

    - name: Locate latest mount probe dump
      ansible.builtin.shell: |
        latest=$(ls -1t /var/log/mount_probe 2>/dev/null | head -1)
        if [ -n "$latest" ]; then
          printf '/var/log/mount_probe/%s\n' "$latest"
        fi
      delegate_to: services
      become: true
      register: latest_mount_probe_dump
      changed_when: false
      when: services_ssh is succeeded

    - name: Persist failure timestamp for cross-host correlation
      ansible.builtin.set_fact:
        virtiofs_failure_timestamp: >-
          {{
            (mount_probe_state.stdout | default('')).split()[2]
            if (((mount_probe_state.stdout | default('')).split()) | length) >= 3
            else ''
          }}
      when: services_ssh is succeeded

    - name: Capture services-side forensic summary
      ansible.builtin.shell: |
        latest_dump="{{ latest_mount_probe_dump.stdout | trim }}"

        echo "collected_at=$(date --iso-8601=seconds)"
        echo "host=$(hostname)"
        echo
        echo "### mount_probe_state"
        cat /var/lib/mount_probe/state 2>/dev/null || true
        echo
        echo "### latest_mount_probe_dump"
        if [ -n "$latest_dump" ]; then
          printf '%s\n' "$latest_dump"
        else
          echo "none"
        fi
        echo
        echo "### mount_probe_journal"
        journalctl -t mount_probe -n 100 --no-pager || true
        echo
        echo "### virtiofs_mounts"
        findmnt --types virtiofs --output TARGET,SOURCE,FSTYPE,OPTIONS || true
        echo
        echo "### blocked_processes"
        ps -eo pid,ppid,stat,wchan:32,comm,args | awk '$3 ~ /D/' || true
        echo
        echo "### processes_referencing_storage_paths"
        ps -eo pid,ppid,stat,comm,args | grep -E '/mnt/storage/(smb|syncthing)' | grep -v grep || true
        echo
        echo "### running_units"
        systemctl list-units --type=service --type=timer --state=running,failed --no-pager || true
        echo
        echo "### all_timers"
        systemctl list-timers --all --no-pager || true
        echo
        echo "### compose_references_to_storage_paths"
        grep -RsnE '/mnt/storage/(smb|syncthing)' /home/*/docker-compose.yml /home/*/*/docker-compose.yml 2>/dev/null || true
        echo
        echo "### docker_container_mount_refs"
        docker ps --format '{% raw %}{{.ID}} {{.Names}}{% endraw %}' 2>/dev/null | while read -r container_id container_name; do
          [ -n "$container_id" ] || continue
          echo
          echo "## ${container_name} (${container_id})"
          docker inspect "$container_id" 2>/dev/null | grep -nE '"(Source|Destination)": "/mnt/storage/(smb|syncthing)' -C 2 || true
        done
      delegate_to: services
      become: true
      register: services_forensics
      changed_when: false
      when: services_ssh is succeeded

    - name: Write services-side forensic summary locally
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost'].virtiofs_failure_output_dir }}/services.txt"
        content: "{{ services_forensics.stdout }}\n"
        mode: "0644"
      when: services_ssh is succeeded

    - name: Read latest mount probe dump content
      ansible.builtin.slurp:
        src: "{{ latest_mount_probe_dump.stdout | trim }}"
      delegate_to: services
      become: true
      register: latest_mount_probe_dump_content
      when:
        - services_ssh is succeeded
        - (latest_mount_probe_dump.stdout | trim | length) > 0

    - name: Write latest mount probe dump locally
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost'].virtiofs_failure_output_dir }}/{{ latest_mount_probe_dump.stdout | trim | basename }}"
        content: "{{ latest_mount_probe_dump_content.content | b64decode }}"
        mode: "0644"
      when:
        - services_ssh is succeeded
        - latest_mount_probe_dump_content is defined
        - latest_mount_probe_dump_content.content is defined

- name: Collect proxmox-side virtiofs evidence
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Check whether proxmox SSH is reachable
      ansible.builtin.wait_for:
        host: "{{ hostvars['proxmox'].ansible_host }}"
        port: 22
        timeout: 5
        connect_timeout: 3
      register: proxmox_ssh
      ignore_errors: true
      changed_when: false

    - name: Record unreachable proxmox host locally
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost'].virtiofs_failure_output_dir }}/proxmox-unreachable.txt"
        content: |
          collected_at={{ lookup('pipe', 'date --iso-8601=seconds') }}
          host=proxmox
          ansible_host={{ hostvars['proxmox'].ansible_host }}
          reason={{ proxmox_ssh.msg | default('ssh port check failed') }}
        mode: "0644"
      when: proxmox_ssh is failed

    - name: Capture proxmox-side forensic summary
      ansible.builtin.shell: |
        failure_ts="{{ hostvars['localhost'].virtiofs_failure_timestamp | default('') }}"
        if [ -n "$failure_ts" ]; then
          since=$(date -d "$failure_ts - 10 minutes" --iso-8601=seconds 2>/dev/null || true)
          until=$(date -d "$failure_ts + 10 minutes" --iso-8601=seconds 2>/dev/null || true)
        else
          since=""
          until=""
        fi

        echo "collected_at=$(date --iso-8601=seconds)"
        echo "host=$(hostname)"
        echo "failure_timestamp=$failure_ts"
        echo "journal_since=$since"
        echo "journal_until=$until"
        echo
        echo "### qm_config_4001"
        qm config 4001 || true
        echo
        echo "### virtiofsd_processes"
        ps -eo pid,ppid,lstart,cmd | grep -E '[v]irtiofsd|/usr/bin/kvm -id 4001 ' || true
        echo
        echo "### zpool_status"
        zpool status -x || true
        echo
        echo "### zpool_iostat"
        zpool iostat -v 1 3 || true
        echo
        echo "### host_journal_window"
        if [ -n "$since" ] && [ -n "$until" ]; then
          journalctl --since "$since" --until "$until" --no-pager | grep -Ei 'virtiofs|fuse|qemu|4001|hang|blocked|stuck|timeout|storage/smb|storage/syncthing' || true
        else
          echo "failure timestamp unavailable"
        fi
      delegate_to: proxmox
      become: true
      register: proxmox_forensics
      changed_when: false
      when: proxmox_ssh is succeeded

    - name: Write proxmox-side forensic summary locally
      ansible.builtin.copy:
        dest: "{{ hostvars['localhost'].virtiofs_failure_output_dir }}/proxmox.txt"
        content: "{{ proxmox_forensics.stdout }}\n"
        mode: "0644"
      when: proxmox_ssh is succeeded